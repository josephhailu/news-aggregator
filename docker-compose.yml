services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-news}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-news}
      POSTGRES_DB: ${POSTGRES_DB:-news_aggregator}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U news -d news_aggregator"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-news}:${POSTGRES_PASSWORD:-news}@postgres:5432/${POSTGRES_DB:-news_aggregator}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-local-dev-secret-change-me-32-bytes}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:4000}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:5173}
      API_PORT: ${API_PORT:-4000}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:1b}
      DEV_ADMIN_EMAIL: ${DEV_ADMIN_EMAIL:-admin@local.test}
      DEV_ADMIN_PASSWORD: ${DEV_ADMIN_PASSWORD:-devpassword123}
      DEV_ADMIN_NAME: ${DEV_ADMIN_NAME:-Local Admin}
    command: >
      sh -c "pnpm --filter @news-aggregator/db db:migrate &&
             pnpm --filter @news-aggregator/api seed:dev-admin &&
             pnpm --filter @news-aggregator/api start"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    ports:
      - "5173:5173"
    depends_on:
      - api

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-pull:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "until ollama list >/dev/null 2>&1; do
        sleep 2;
      done;
      ollama pull ${OLLAMA_MODEL:-llama3.2:1b}"
    depends_on:
      - ollama

volumes:
  postgres_data:
  ollama_data:
