services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-news}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-news}
      POSTGRES_DB: ${POSTGRES_DB:-news_aggregator}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U news -d news_aggregator"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-pull:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "until ollama list >/dev/null 2>&1; do
        sleep 2;
      done;
      ollama pull ${OLLAMA_MODEL:-llama3.2:1b}"
    depends_on:
      - ollama

  dev-deps:
    image: node:22-alpine
    working_dir: /app
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "corepack enable &&
       pnpm config set store-dir /pnpm/store &&
       pnpm install --frozen-lockfile=false"
    environment:
      CI: "true"
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - api_node_modules:/app/apps/api/node_modules
      - web_node_modules:/app/apps/web/node_modules
      - db_node_modules:/app/packages/db/node_modules
      - pnpm_store:/pnpm/store

  api:
    image: node:22-alpine
    working_dir: /app
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "corepack enable &&
       pnpm --filter @news-aggregator/db db:migrate &&
       pnpm --filter @news-aggregator/api seed:dev-admin &&
       pnpm --filter @news-aggregator/api dev"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-news}:${POSTGRES_PASSWORD:-news}@postgres:5432/${POSTGRES_DB:-news_aggregator}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-local-dev-secret-change-me-32-bytes}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:4000}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:5173}
      API_PORT: ${API_PORT:-4000}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:1b}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-30m}
      OLLAMA_PREWARM: ${OLLAMA_PREWARM:-true}
      DEV_ADMIN_EMAIL: ${DEV_ADMIN_EMAIL:-admin@local.test}
      DEV_ADMIN_PASSWORD: ${DEV_ADMIN_PASSWORD:-devpassword123}
      DEV_ADMIN_NAME: ${DEV_ADMIN_NAME:-Local Admin}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
      dev-deps:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - api_node_modules:/app/apps/api/node_modules
      - db_node_modules:/app/packages/db/node_modules
      - pnpm_store:/pnpm/store

  web:
    image: node:22-alpine
    working_dir: /app
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "corepack enable &&
       pnpm --filter @news-aggregator/web dev"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_started
      dev-deps:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - root_node_modules:/app/node_modules
      - web_node_modules:/app/apps/web/node_modules
      - pnpm_store:/pnpm/store

volumes:
  postgres_data:
  ollama_data:
  root_node_modules:
  api_node_modules:
  web_node_modules:
  db_node_modules:
  pnpm_store:
